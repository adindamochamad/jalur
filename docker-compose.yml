# Docker Compose — Project Jalur (Deteksi Jalan Berlubang)
# Port sengaja dipisah agar tidak tabrakan dengan project lain:
#   - Frontend Next.js: 3010  (lms/tesdishub/mywebsite/nexapos pakai 8001–8004, 8080, 8085)
#   - Backend CI4 API:  8010
#   - MySQL:            3310  (lms 3306, tesdishub 3307, nexapos 3308, kasirix 3309)
#   - FastAPI AI:       internal only (tidak di-expose ke host)
#
# Cara jalankan: docker compose up -d
#   → Frontend:  http://localhost:3010
#   → API:       http://localhost:8010
#   → MySQL:     host 127.0.0.1, port 3310, user root, password dari .env, database jalur

services:
  frontend:
    image: node:20-alpine
    container_name: jalur-frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
      - jalur-node-modules:/app/node_modules
    ports:
      - "3010:3000"
    environment:
      # Isi di .env: NEXT_PUBLIC_API_URL (default http://localhost:8010)
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL:-http://localhost:8010}
      - NODE_ENV=production
    # Production build: install termasuk dev (untuk TypeScript saat build), lalu build & start
    command: sh -c "npm install --include=dev && (test -f .next/BUILD_ID || npm run build) && npm run start"
    networks:
      - jalur-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: jalur-backend
    container_name: jalur-backend
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
    ports:
      - "8010:8080"
    environment:
      - CI_ENVIRONMENT=development
      - database.default.hostname=mysql
      - database.default.database=${MYSQL_DATABASE:-jalur}
      - database.default.username=${MYSQL_USER:-jalur}
      - database.default.password=${MYSQL_PASSWORD}
      - database.default.DBDriver=MySQLi
      - app.baseURL=${APP_BASE_URL:-http://localhost:8010}
      - AI_SERVICE_URL=http://ai-service:8000
      - JWT_SECRET=${JWT_SECRET}
      - CORS_EXTRA_ORIGINS=${CORS_EXTRA_ORIGINS:-}
    command: sh -c "chmod -R 777 writable 2>/dev/null || true; php -S 0.0.0.0:8080 -t public vendor/codeigniter4/framework/system/rewrite.php"
    depends_on:
      mysql:
        condition: service_healthy
      ai-service:
        condition: service_started
    networks:
      - jalur-network

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    image: jalur-ai-service
    container_name: jalur-ai-service
    working_dir: /app
    volumes:
      - ./ai-service:/app
    # Port 8000 TIDAK di-expose ke host (hanya backend yang akses lewat internal network)
    expose:
      - "8000"
    environment:
      - PYTHONUNBUFFERED=1
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    networks:
      - jalur-network

  mysql:
    image: mysql:8.0
    platform: linux/amd64
    container_name: jalur-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-jalur}
      MYSQL_USER: ${MYSQL_USER:-jalur}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3310:3306"
    volumes:
      - jalur-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - jalur-network

volumes:
  jalur-node-modules:
  jalur-mysql-data:

networks:
  jalur-network:
    driver: bridge
